document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e=\"width:17px;height:17px;color:#c2c7d4;flex-shrink:0;\"><\u002Fi>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;align-items:center;gap:10px;background:#eef4ff;border:1px solid #e2ecff;border-radius:16px;padding:14px 20px;\">\n    <i data-lucide=\"info\" style=\"width:18px;height:18px;color:#3b82f6;flex-shrink:0;\"><\u002Fi>\n    <span style=\"font-size:13px;color:#4b6a9b;\">The last teaching week of each quarter (shaded gray in the calendar) is the <strong>quarter exam week<\u002Fstrong> — no new teaching during exam week.<\u002Fspan>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showDetail }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"display:flex;flex-direction:column;gap:20px;\">\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n      <div sc-camel-on-click=\"{{ goBack }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:#ffffff;border:1px solid #e4e7f0;border-radius:999px;padding:9px 16px 9px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#374151;\" style-hover=\"background:#f2f4fa\">\n        <i data-lucide=\"arrow-left\" style=\"width:16px;height:16px;color:#374151;\"><\u002Fi> Back to overview\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <section style=\"background:#ffffff;border:1px solid #eef0f7;border-radius:22px;padding:24px 26px;box-shadow:0 10px 30px rgba(60,72,120,.06);\">\n      <h2 style=\"font-size:20px;font-weight:800;margin:0 0 4px;color:#1f2430;\">{{ detailTitle }}<\u002Fh2>\n      <p style=\"font-size:13px;color:#8a90a0;margin:0 0 18px;\">{{ detailMeta }}<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:14px;background:#fafbfe;border:1px solid #eef0f7;border-radius:14px;padding:14px 18px;\">\n        <span style=\"font-size:12.5px;font-weight:600;color:#6b7280;white-space:nowrap;\">Progress<\u002Fspan>\n        <div style=\"flex:1;height:9px;background:#e6eaf3;border-radius:999px;overflow:hidden;\"><div style=\"width:{{ progressPct }};height:100%;background:#22c55e;border-radius:999px;transition:width .25s;\"><\u002Fdiv><\u002Fdiv>\n        <span style=\"font-size:12.5px;font-weight:700;color:#16a34a;white-space:nowrap;min-width:130px;text-align:right;\">{{ progressLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <sc-for list=\"{{ detailQuarters }}\" as=\"q\" hint-placeholder-count=\"4\">\n      <section style=\"background:#ffffff;border:1px solid #eef0f7;border-radius:22px;padding:0;overflow:hidden;box-shadow:0 10px 30px rgba(60,72,120,.06);\">\n        <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding:16px 22px;background:{{ q.headBg }};border-bottom:1px solid {{ q.headBorder }};\">\n          <div style=\"display:flex;flex-direction:column;\">\n            <span style=\"font-size:16px;font-weight:800;color:{{ q.color }};\">{{ q.label }}<\u002Fspan>\n            <span style=\"font-size:11.5px;color:#6b7280;\">{{ q.dates }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-size:12px;color:#6b7280;\">{{ q.weeks }}<\u002Fspan>\n          <span style=\"font-size:12px;color:#6b7280;font-weight:600;\">{{ q.periods }}<\u002Fspan>\n          <div style=\"margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:#ffffff;border:1px solid {{ q.headBorder }};border-radius:999px;padding:5px 12px;\">\n            <i data-lucide=\"clipboard-check\" style=\"width:14px;height:14px;color:{{ q.color }};\"><\u002Fi>\n            <span style=\"font-size:11.5px;font-weight:600;color:{{ q.color }};\">Exam: {{ q.exam }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:48px minmax(150px,0.9fr) 56px minmax(240px,1.5fr);gap:0;padding:9px 22px;background:#fafbfe;border-bottom:1px solid #eef0f7;\">\n          <div style=\"font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9aa0b0;\">Unit<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9aa0b0;\">Topic<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9aa0b0;text-align:center;\">Done<\u002Fdiv>\n          <div style=\"font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#9aa0b0;\">Remarks<\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ q.rows }}\" as=\"row\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:48px minmax(150px,0.9fr) 56px minmax(240px,1.5fr);gap:0;padding:11px 22px;align-items:center;border-bottom:1px solid #f2f4f9;\">\n            <div style=\"font-size:11.5px;color:#9aa0b0;font-weight:600;\">{{ row.unit }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;min-width:0;\">\n              <span style=\"font-size:13px;color:#1f2430;font-weight:600;\">{{ row.topic }}<\u002Fspan>\n              <sc-if value=\"{{ row.hasStream }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"font-size:10px;font-weight:600;color:#5b52a3;background:#ecebfb;padding:2px 8px;border-radius:6px;white-space:nowrap;\">{{ row.stream }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"text-align:center;\"><input type=\"checkbox\" class=\"chk\" checked=\"{{ row.checked }}\" sc-camel-on-change=\"{{ row.toggle }}\"><\u002Fdiv>\n            <div><input class=\"rmk\" type=\"text\" placeholder=\"Remarks…\" sc-camel-default-value=\"{{ row.remark }}\" sc-camel-on-input=\"{{ row.onRemark }}\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fsc-for>\n\n    <section style=\"background:#ffffff;border:1px solid #eef0f7;border-radius:22px;padding:22px 26px;box-shadow:0 10px 30px rgba(60,72,120,.06);\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n        <i data-lucide=\"mail\" style=\"width:18px;height:18px;color:#16a34a;\"><\u002Fi>\n        <h3 style=\"font-size:15px;font-weight:700;margin:0;color:#1f2430;\">Send Progress Report to HOD — {{ detailTitle }}<\u002Fh3>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:14px;\">\n        <div>\n          <label style=\"font-size:10px;color:#9aa0b0;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;font-weight:600;\">Your Name<\u002Flabel>\n          <input class=\"rmk\" type=\"text\" placeholder=\"e.g. Ms. Smith\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-size:10px;color:#9aa0b0;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;font-weight:600;\">Your Email (for reply)<\u002Flabel>\n          <input class=\"rmk\" type=\"email\" placeholder=\"your@sibs.ac.th\">\n        <\u002Fdiv>\n        <div>\n          <label style=\"font-size:10px;color:#9aa0b0;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;font-weight:600;\">HOD Email<\u002Flabel>\n          <input class=\"rmk\" type=\"email\" sc-camel-default-value=\"rochelle.v@sibs.ac.th\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:18px;\">\n        <label style=\"font-size:10px;color:#9aa0b0;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px;font-weight:600;\">Additional Message (optional)<\u002Flabel>\n        <input class=\"rmk\" type=\"text\" placeholder=\"e.g. Some units carried over to next week…\">\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n        <div style=\"display:inline-flex;align-items:center;gap:8px;background:#16a34a;color:#fff;border-radius:999px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;\" style-hover=\"background:#128a3d\">\n          <i data-lucide=\"send\" style=\"width:16px;height:16px;color:#fff;\"><\u002Fi> Send Email to HOD\n        <\u002Fdiv>\n        <div sc-camel-on-click=\"{{ doPrint }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:#eef4ff;color:#2563eb;border:1px solid #e2ecff;border-radius:999px;padding:11px 22px;font-size:13px;font-weight:700;cursor:pointer;\" style-hover=\"background:#e4edff\">\n          <i data-lucide=\"printer\" style=\"width:16px;height:16px;color:#2563eb;\"><\u002Fi> Print / Save PDF\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nconst QCOLOR = {\n  Q1:{color:'#2563eb', headBg:'#eef4ff', headBorder:'#e2ecff'},\n  Q2:{color:'#16a34a', headBg:'#edfaf0', headBorder:'#d7f0dd'},\n  Q3:{color:'#334155', headBg:'#eef3fb', headBorder:'#e0e8f4'},\n  Q4:{color:'#ea7a1f', headBg:'#fff5ec', headBorder:'#fbe3cd'},\n};\nconst QEXAM = { Q1:'5 – 9 Oct 2026', Q2:'7 – 11 Dec 2026', Q3:'15 – 19 Mar 2027', Q4:'21 – 25 Jun 2027' };\nconst YEARS = [\n  { id:'y7',  title:'Year 7',  sub:'Cambridge Lower Secondary Maths', icon:'book-open-text', tint:'#e7edff', color:'#3b82f6' },\n  { id:'y8',  title:'Year 8',  sub:'Cambridge Lower Secondary Maths', icon:'book-marked',    tint:'#e3f6e9', color:'#16a34a' },\n  { id:'y9',  title:'Year 9',  sub:'Cambridge Lower Secondary Maths', icon:'notebook-pen',   tint:'#fde6cf', color:'#ea7a1f' },\n  { id:'y10igcse', title:'Y10 IGCSE', sub:'Mathematics 0580',        icon:'library-big',    tint:'#ede4fb', color:'#7c3aed' },\n  { id:'y11igcse', title:'Y11 IGCSE', sub:'Mathematics 0580',        icon:'clipboard-list', tint:'#fde0ea', color:'#e11d63' },\n  { id:'y10add', title:'Y10 Add Maths', sub:'Additional Mathematics 0606', icon:'box',      tint:'#d7f2ef', color:'#0d9488' },\n  { id:'y11add', title:'Y11 Add Maths', sub:'Additional Mathematics 0606', icon:'boxes',    tint:'#fdeacf', color:'#d97706' },\n  { id:'y12', title:'Year 12', sub:'AS Level Mathematics 9709',      icon:'book-open',      tint:'#e0e7ff', color:'#4f46e5' },\n  { id:'y13', title:'Year 13', sub:'A2 Level Mathematics 9709',      icon:'graduation-cap', tint:'#efe0fb', color:'#9333ea' },\n];\n\nclass Component extends DCLogic {\n  state = { view:'overview', data:null, done:{} };\n\n  componentDidMount() {\n    let done = {};\n    try { done = JSON.parse(localStorage.getItem('sbs-done')||'{}'); } catch(e){}\n    this._remarks = {};\n    try { this._remarks = JSON.parse(localStorage.getItem('sbs-remarks')||'{}'); } catch(e){}\n    this.setState({ done });\n    import('./tracker-data.js').then(m => this.setState({ data:m.TRACKER })).catch(()=>{});\n    this._icons();\n  }\n  componentDidUpdate() { this._icons(); }\n  _icons() { if (window.lucide) window.lucide.createIcons(); }\n\n  _save(done){ try{ localStorage.setItem('sbs-done', JSON.stringify(done)); }catch(e){} }\n\n  renderVals() {\n    const view = this.state.view;\n    const isOverview = view === 'overview';\n    const data = this.state.data;\n    const yr = (!isOverview && data) ? data[view] : null;\n\n    const years = YEARS.map(y => ({ ...y, open: () => { this.setState({ view:y.id }); window.scrollTo(0,0); } }));\n\n    // Per-quarter progress aggregated across every year level\n    const done = this.state.done || {};\n    const qpct = ['0%','0%','0%','0%'];\n    if (data) {\n      for (let qi=0; qi<4; qi++) {\n        let total=0, dc=0;\n        for (const yid in data) {\n          const q = data[yid].quarters[qi];\n          if (!q) continue;\n          q.rows.forEach((r, ri) => { total++; if (done[yid+':'+qi+':'+ri]) dc++; });\n        }\n        qpct[qi] = total ? Math.round((dc/total)*100)+'%' : '0%';\n      }\n    }\n\n    let detailQuarters = [], progressPct='0%', progressLabel='0 / 0 completed', detailTitle='', detailMeta='';\n    if (yr) {\n      detailTitle = yr.title; detailMeta = yr.meta;\n      let total=0, doneCount=0;\n      const done = this.state.done;\n      detailQuarters = yr.quarters.map((q, qi) => {\n        const c = QCOLOR[q.label] || QCOLOR.Q1;\n        const rows = q.rows.map((r, ri) => {\n          const key = view+':'+qi+':'+ri;\n          total++;\n          const checked = !!done[key];\n          if (checked) doneCount++;\n          const pv = parseInt((r.periods.match(/(\\d+)/)||[])[1]||0,10);\n          const barPct = Math.min(100, Math.round((pv/12)*100)) + '%';\n          return {\n            unit:r.unit, topic:r.topic, periods:r.periods, weeks:r.weeks,\n            hasStream: !!r.stream, stream:r.stream||'', barPct, checked,\n            toggle: () => { const nd = { ...this.state.done, [key]: !this.state.done[key] }; if(!nd[key]) delete nd[key]; this._save(nd); this.setState({ done:nd }); },\n            remark: this._remarks[key] || '',\n            onRemark: (e) => { this._remarks[key] = e.target.value; try{ localStorage.setItem('sbs-remarks', JSON.stringify(this._remarks)); }catch(x){} },\n          };\n        });\n        return { label:q.label, dates:q.dates, weeks:q.weeks, periods:q.periods,\n                 color:c.color, headBg:c.headBg, headBorder:c.headBorder, exam:QEXAM[q.label]||'', rows };\n      });\n      progressPct = total ? Math.round((doneCount/total)*100)+'%' : '0%';\n      progressLabel = doneCount+' / '+total+' completed';\n    }\n\n    return {\n      showOverview: isOverview,\n      showDetail: !isOverview,\n      q1pct:qpct[0], q2pct:qpct[1], q3pct:qpct[2], q4pct:qpct[3],\n      years, detailQuarters, detailTitle, detailMeta, progressPct, progressLabel,\n      goBack: () => { this.setState({ view:'overview' }); window.scrollTo(0,0); },\n      doPrint: () => window.print(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
